<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artistas | BlackLine Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .artist-card {
      transition: all 0.4s ease;
    }
    .artist-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(220, 38, 38, 0.4);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      max-width: 1000px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px;
      position: relative;
    }
    .modal-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .modal-gallery img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .modal-gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-neutral-900 via-neutral-800 to-black text-gray-200 min-h-screen flex flex-col">

<!-- Navbar fixo (sem link Galeria) -->
<nav class="bg-black border-b border-neutral-800 text-white fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <!-- Logo + Nome no canto esquerdo -->
    <a href="index.html" class="flex items-center space-x-3">
      <img src="assets/imagens/logo.png" alt="Logo BlackLine Studio" class="h-10 w-10 object-contain">
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide text-white">BlackLine Studio</h1>
    </a>

    <!-- Links do menu (sem Galeria) -->
    <ul class="flex space-x-6 md:space-x-8 text-base md:text-lg items-center">
      <li><a href="index.html" class="hover:text-red-500 transition">Início</a></li>
      <li><a href="artists.html" class="hover:text-red-500 transition">Artistas</a></li>
      <li><a href="booking.html" class="hover:text-red-500 transition">Agendamentos</a></li>
      <li><a href="contact.html" class="hover:text-red-500 transition">Contactos</a></li>

      <!-- Links dinâmicos -->
      <li id="guest-links">
        <a href="client-login.html" class="hover:text-red-500 transition">Área Cliente</a>
      </li>
      <li id="user-links" class="hidden flex items-center space-x-6">
        <a href="perfil.html" class="hover:text-red-500 transition">Perfil</a>
        <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium transition">
          Sair
        </button>
      </li>

      <li><a href="login.html" class="hover:text-red-500 transition">Admin</a></li>
    </ul>
  </div>
</nav>

<!-- Espaço para navbar fixo -->
<div class="h-20"></div>

<main class="max-w-6xl mx-auto px-6 py-16">
  <h2 class="text-5xl font-extrabold text-center mb-16 text-white">Os Nossos Artistas</h2>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10" id="artists-grid">
    <!-- Artistas adicionados via JS -->
  </div>
</main>

<!-- Modal / Lightbox -->
<div id="artist-modal" class="modal">
  <div class="modal-content">
    <button onclick="closeModal()" class="absolute top-6 right-6 text-4xl text-gray-400 hover:text-white">✕</button>
    
    <h3 id="modal-artist-name" class="text-4xl font-bold text-red-500 mb-2"></h3>
    <p id="modal-artist-desc" class="text-gray-400 mb-8 text-lg"></p>
    
    <div id="modal-gallery" class="modal-gallery">
      <!-- Imagens inseridas via JS -->
    </div>
  </div>
</div>

<script>
// Dados dos artistas (adiciona mais facilmente aqui)
const artists = [
  {
    id: 1,
    name: "Alex Ink",
    desc: "Especialista em realismo e blackwork. Mais de 10 anos de experiência em detalhes extremos e sombreamento profundo.",
    images: [
      "assets/imagens/artists/alex1.jpg",
      "assets/imagens/artists/alex2.jpg",
      "assets/imagens/artists/alex3.jpg",
      "assets/imagens/artists/alex4.jpg"
    ]
  },
  {
    id: 2,
    name: "Maya Line",
    desc: "Mestre em fine line e tatuagens minimalistas. Linhas precisas, delicadas e elegantes para designs subtis.",
    images: [
      "assets/imagens/artists/maya1.jpg",
      "assets/imagens/artists/maya2.jpg",
      "assets/imagens/artists/maya3.jpg",
      "assets/imagens/artists/maya4.jpg"
    ]
  }
  // Adiciona mais artistas aqui...
];

function renderArtists() {
  const container = document.getElementById('artists-grid');
  container.innerHTML = '';

  artists.forEach(artist => {
    const card = document.createElement('div');
    card.className = 'artist-card bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden cursor-pointer';
    card.innerHTML = `
      <img src="${artist.images[0]}" class="w-full h-80 object-cover">
      <div class="p-6">
        <h3 class="text-2xl font-bold text-red-500">${artist.name}</h3>
        <p class="text-gray-400 mt-3 line-clamp-3">${artist.desc}</p>
      </div>
    `;
    card.onclick = () => openArtistModal(artist);
    container.appendChild(card);
  });
}

function openArtistModal(artist) {
  document.getElementById('modal-artist-name').textContent = artist.name;
  document.getElementById('modal-artist-desc').textContent = artist.desc;
  
  const gallery = document.getElementById('modal-gallery');
  gallery.innerHTML = '';
  
  artist.images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    gallery.appendChild(img);
  });
  
  document.getElementById('artist-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('artist-modal').style.display = 'none';
}

// Inicializa a página
renderArtists();
</script>

</body>
</html>
