<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Agendamentos | BlackLine Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-neutral-900 via-neutral-800 to-black text-gray-200 min-h-screen flex flex-col">

<nav class="bg-black border-b border-neutral-800 text-white">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold">BlackLine Studio</h1>
    <ul class="flex space-x-6">
      <li><a href="index.html" class="hover:text-red-500">Início</a></li>
      <li><a href="gallery.html" class="hover:text-red-500">Galeria</a></li>
      <li><a href="artists.html" class="hover:text-red-500">Artistas</a></li>
      <li><a href="booking.html" class="text-red-500 font-semibold">Agendamentos</a></li>
      <li><a href="contact.html" class="hover:text-red-500">Contactos</a></li>
      <li><a href="login.html" class="hover:text-red-500">Login</a></li>
    </ul>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center px-6 py-16">
  <form class="bg-neutral-900 border border-neutral-800 p-8 rounded-xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-red-500 mb-6 text-center">Marcar Sessão</h2>

    <input type="text" placeholder="Nome"
      class="w-full mb-4 p-3 bg-neutral-800 border border-neutral-700 rounded text-white">

    <input type="email" placeholder="Email"
      class="w-full mb-4 p-3 bg-neutral-800 border border-neutral-700 rounded text-white">

    <textarea placeholder="Ideia da tatuagem"
      class="w-full mb-6 p-3 bg-neutral-800 border border-neutral-700 rounded text-white"></textarea>

    <button class="w-full bg-red-600 hover:bg-red-700 py-3 rounded font-bold">
      Enviar Pedido
    </button>
  </form>
</main>

<footer class="bg-black border-t border-neutral-800 text-gray-400 text-center py-4">
  <p>© <span id="ano"></span> BlackLine Studio</p>
</footer>

<script>
  document.getElementById("ano").textContent = new Date().getFullYear();
</script>

</body>
</html>
