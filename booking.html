<nav class="bg-black border-b border-neutral-800 text-white fixed w-full top-0 z-50">

    <!-- Links do menu -->

      <li><a href="index.html" class="hover:text-red-500 transition">Início</a></li>

      <li><a href="booking.html" class="hover:text-red-500 transition">Agendamentos</a></li>

      <!-- Links dinâmicos (login cliente vs perfil/logout) -->
      <li id="guest-links">

<!-- Espaço para evitar que o conteúdo fique por baixo do navbar fixo -->
<div class="h-20"></div> <!-- Ajusta a altura conforme o teu navbar -->

<main class="flex-grow flex items-center justify-center px-6 py-16">

    <textarea placeholder="Ideia da tatuagem"
      class="w-full mb-6 p-3 bg-neutral-800 border border-neutral-700 rounded text-white"></textarea>

      Enviar Pedido

</main>

<footer class="bg-black border-t border-neutral-800 text-gray-400 text-center py-4">
  <p>© <span id="ano"></span> BlackLine Studio</p>
</footer>

<script>
  document.getElementById("ano").textContent = new Date().getFullYear();
</script>

</body>
<script type="module">
  import { auth, onAuthStateChanged, signOut } from './assets/js/firebase.js';

  onAuthStateChanged(auth, async (user) => {
    const guestLinks = document.getElementById('guest-links');
    const userLinks = document.getElementById('user-links');
    const logoutBtn = document.getElementById('logout-btn');

    if (user) {
      // Utilizador logado → mostra Perfil + Logout
      guestLinks?.classList.add('hidden');
      userLinks?.classList.remove('hidden');

      // Logout funcional
      if (logoutBtn) {
        logoutBtn.onclick = async () => {
          await signOut(auth);
          window.location.href = 'index.html';
        };
      }

      // Verifica se é "primeiro login" ou perfil incompleto
      // (aqui usamos displayName como indicador simples – se vazio, assume incompleto)
      if (!user.displayName) {
        showFirstLoginNotification();
      }
    } else {
      // Não logado → mostra Área Cliente
      guestLinks?.classList.remove('hidden');
      userLinks?.classList.add('hidden');
    }
  });

  // Função para mostrar notificação de topo
  function showFirstLoginNotification() {
    const notification = document.createElement('div');
    notification.innerHTML = `
      <div class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-neutral-800 border border-red-600 text-gray-200 px-6 py-4 rounded-lg shadow-2xl z-50 flex items-center space-x-4 animate-fade-in">
        <span>Atualize o seu perfil para uma melhor experiência!</span>
        <a href="perfil.html" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium transition">
          Ir ao Perfil
        </a>
        <button id="close-notification" class="text-gray-400 hover:text-white">✕</button>
      </div>
    `;

    document.body.appendChild(notification);

    // Fechar ao clicar no X
    document.getElementById('close-notification')?.addEventListener('click', () => {
      notification.remove();
    });

    // Desaparece sozinho após 12 segundos
    setTimeout(() => notification.remove(), 12000);
  }
</script>

<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
</style>
<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
</style>

</form>

<script type="module" src="assets/js/booking.js"></script>
<script type="module">
  import { auth, onAuthStateChanged, signOut } from './assets/js/firebase.js';  // ajusta o caminho se necessário

  onAuthStateChanged(auth, (user) => {
    const guestLinks = document.getElementById('guest-links');
    const userLinks = document.getElementById('user-links');
    const logoutBtn = document.getElementById('logout-btn');

    if (user) {
      // Logado: mostra Perfil + Sair
      if (guestLinks) guestLinks.classList.add('hidden');
      if (userLinks) userLinks.classList.remove('hidden');

      // Logout
      if (logoutBtn) {
        logoutBtn.onclick = () => {
          signOut(auth).then(() => {
            window.location.href = 'index.html';
          });
        };
      }
    } else {
      // Não logado: mostra Área Cliente
      if (guestLinks) guestLinks.classList.remove('hidden');
      if (userLinks) userLinks.classList.add('hidden');
    }
  });
</script>
