<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | BlackLine Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Vibe tattoo/dark consistente */
    body {
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: 'Arial', sans-serif;
    }
    .glow-red:focus {
      box-shadow: 0 0 15px rgba(220, 38, 38, 0.6);
      border-color: #dc2626;
    }
    .btn-tattoo {
      background: #dc2626;
      transition: all 0.3s ease;
    }
    .btn-tattoo:hover {
      background: #b91c1c;
      transform: scale(1.05);
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .message {
      transition: opacity 0.3s ease;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center">

  <div class="card p-10 rounded-xl w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white tracking-wider">BLACKLINE STUDIO</h1>
      <p class="text-gray-400 mt-2">Área Administrativa</p>
    </div>

    <!-- Formulário de login -->
    <form id="admin-login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
        <input 
          id="email" 
          type="email" 
          required 
          autocomplete="email"
          class="mt-1 block w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 glow-red transition"
          placeholder="admin@blackline.pt"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input 
          id="password" 
          type="password" 
          required 
          autocomplete="current-password"
          class="mt-1 block w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 glow-red transition"
          placeholder="••••••••"
        />
      </div>

      <button 
        type="submit"
        class="btn-tattoo w-full py-3 px-4 rounded-lg text-white font-bold uppercase tracking-wider"
      >
        Entrar
      </button>
    </form>

    <!-- Área para mensagens (sucesso/erro) -->
    <div id="message" class="mt-4 text-center text-sm font-medium message hidden"></div>

    <div class="mt-6 text-center text-sm">
      <a href="index.html" class="text-gray-400 hover:text-red-500 transition">Voltar ao site</a>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword } from './assets/js/firebase.js';  // ajusta o caminho se necessário

    const form = document.getElementById('admin-login-form');
    const messageDiv = document.getElementById('message');

    if (!form || !messageDiv) {
      console.error('Elementos do formulário ou mensagem não encontrados.');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email')?.value.trim();
      const password = document.getElementById('password')?.value;

      if (!email || !password) {
        showMessage('Preencha email e password.', 'text-red-500');
        return;
      }

      showMessage('A autenticar...', 'text-gray-400');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage('Login bem-sucedido! Redirecionando...', 'text-green-500');
        setTimeout(() => {
          window.location.href = 'admin/dashboard.html';  // ajusta o caminho se necessário
        }, 1500);
      } catch (error) {
        console.error('Erro no login admin:', error.code, error.message);

        let msg = 'Erro ao entrar. Verifica as credenciais.';
        switch (error.code) {
          case 'auth/invalid-credential':
          case 'auth/wrong-password':
            msg = 'Email ou password incorretos.';
            break;
          case 'auth/user-not-found':
            msg = 'Utilizador não encontrado.';
            break;
          case 'auth/too-many-requests':
            msg = 'Muitas tentativas. Aguarde alguns minutos.';
            break;
          case 'auth/invalid-email':
            msg = 'Email inválido.';
            break;
        }

        showMessage(msg, 'text-red-500');
      }
    });

    function showMessage(text, colorClass) {
      messageDiv.classList.remove('hidden', 'text-green-500', 'text-red-500', 'text-gray-400');
      messageDiv.classList.add(colorClass);
      messageDiv.textContent = text;
    }
  </script>
</body>
</html>
